name: 地震预警

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 11.0.0

options:
  bundleIdPrefix: com.dizhenyujing
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  地震预警:
    type: application
    platform: iOS
    sources:
      - path: 地震预警
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dizhenyujing.app
        INFOPLIST_FILE: 地震预警/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_PREVIEWS: YES
    entitlements:
      path: 地震预警/地震预警.entitlements
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds

schemes:
  地震预警:
    build:
      targets:
        地震预警: all
    run:
      config: Debug
